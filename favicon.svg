<svg viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left rays -->
  <line x1="80" y1="20" x2="42" y2="7"  stroke="#162564" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"/>
  <line x1="79" y1="28" x2="35" y2="28" stroke="#162564" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"/>
  <line x1="80" y1="36" x2="43" y2="48" stroke="#162564" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"/>
  <!-- Right rays -->
  <line x1="120" y1="20" x2="158" y2="7"  stroke="#162564" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"/>
  <line x1="121" y1="28" x2="165" y2="28" stroke="#162564" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"/>
  <line x1="120" y1="36" x2="157" y2="48" stroke="#162564" stroke-width="3" stroke-linecap="round" stroke-dasharray="10 6"/>
  <!-- Lantern roof -->
  <polyline points="82,22 100,8 118,22" stroke="#162564" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Lantern body -->
  <rect x="82" y="22" width="36" height="14" rx="1.5" stroke="#162564" stroke-width="3" fill="none"/>
  <!-- Tower (tapered) -->
  <path d="M86 36 L76 74 L124 74 L114 36 Z" stroke="#162564" stroke-width="3" stroke-linejoin="round" fill="none"/>
  <!-- Tower stripes -->
  <line x1="77.5" y1="48"  x2="122.5" y2="48"  stroke="#162564" stroke-width="2.5"/>
  <line x1="76.5" y1="58"  x2="123.5" y2="58"  stroke="#162564" stroke-width="2.5"/>
  <line x1="76"   y1="66"  x2="124"   y2="66"  stroke="#162564" stroke-width="2.5"/>
  <!-- Cabin -->
  <rect x="62" y="74" width="76" height="18" rx="2" stroke="#162564" stroke-width="3" fill="none"/>
  <!-- Deck -->
  <line x1="18" y1="92" x2="182" y2="92" stroke="#162564" stroke-width="3" stroke-linecap="round"/>
  <!-- Hull -->
  <path d="M18 92 C24 116, 58 130, 100 131 C142 130, 176 116, 182 92" stroke="#162564" stroke-width="3" stroke-linecap="round" fill="none"/>
